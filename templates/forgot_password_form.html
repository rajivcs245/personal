<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <!-- Professional Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="login-container animate-fade-in">
        <div class="login-card">
            <h2 style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <i data-lucide="key-round" style="width: 32px; height: 32px; color: var(--primary);"></i> Reset Access
            </h2>
            <p style="text-align: center; color: #64748b; margin-bottom: 25px; font-size: 14px;">Enter your email address and we'll send you a recovery token</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, msg in messages %}
            <div class="popup-message {{ category }}">
                {{ msg }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <label>Registered Email Address:</label>
                <input type="email" name="email" placeholder="e.g. name@example.com" value="{{ email or '' }}" required>

                <button type="submit" class="btn">Send Recovery Link</button>
            </form>

            <p class="small-text">
                Remembered your password?
                <a href="{{ url_for('auth.login') }}">Back to Login</a>
            </p>
        </div>
    </div>
    <script>
        lucide.createIcons();

        function toggleVisibility(fieldId, iconId) {
            const field = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);

            if (field.type === 'password') {
                field.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                field.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>
